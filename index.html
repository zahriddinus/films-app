<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Movie Database</title>
  </head>
  <body>
    <div class="main">
      <div class="container py-3 bg-light">
        <h1 class="m-0 mb-3 fs-1 text-center">Movies catalog</h1>

        <div class="main__top mb-4">
          <p class="m-0 mb-2 fs-4 fw-semibold">
            Search results: <span class="search-result fs-3">0</span>
          </p>

          <div class="d-flex">
            <p
              class="m-0 me-3 px-4 py-3 fs-5 w-100 bg-info-subtle rounded-3 border border-info border-opacity-25"
            >
              Click the button on the right to search for a movie.
            </p>

            <button
              class="px-5 btn btn-primary fw-semibold fs-4 rounded-3"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvasWithBothOptions"
              aria-controls="offcanvasWithBothOptions"
            >
              Filter
            </button>
          </div>

          <!-- Sitebar of filter -->

          <div
            class="offcanvas offcanvas-start"
            data-bs-scroll="true"
            tabindex="-1"
            id="offcanvasWithBothOptions"
            aria-labelledby="offcanvasWithBothOptionsLabel"
          >
            <div class="offcanvas-header">
              <h5
                class="offcanvas-title fs-2"
                id="offcanvasWithBothOptionsLabel"
              >
                Filter
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
              ></button>
            </div>

            <form class="film-form offcanvas-body flex-grow-0">
              <input
                type="text"
                class="form-control mb-3"
                placeholder="Movie's name..."
              />

              <input
                type="number"
                class="form-control mb-3"
                placeholder="Movie's rating..."
              />

              <select
                class="film-select-categories form-select mb-3"
                aria-label="Default select example"
              >
                <option value="All">All</option>
              </select>

              <select
                class="form-select mb-3"
                aria-label="Default select example"
              >
                <option selected>Rating (high to low)</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>

              <button type="submit" class="btn btn-primary w-100">
                Search
              </button>
            </form>

            <div class="sitebar__bottom p-3">
              <h2 class="m-0 mb-3 fs-2">Bookmarked movies</h2>

              <!-- <ul class=""></ul> -->
            </div>
          </div>
        </div>

        <ul class="films-list list-unstyled row g-3"></ul>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./js/films.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
